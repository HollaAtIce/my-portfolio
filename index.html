<!DOCTYPE html>
<!-- The line above tells the browser this is a modern HTML5 document. -->

<!-- The <html> tag wraps the whole page. lang="en" says the content is in English. -->
<html lang="en">

<!-- The <head> holds information ABOUT the page (not shown on the page itself). -->
<head>
  <!-- Sets the character encoding so letters and symbols display correctly. -->
  <meta charset="UTF-8" />

  <!-- Makes the page scale nicely on phones and tablets. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- The text shown in the browser tab. -->
  <title>Isaac</title>

  <!-- Google Fonts: load the "Playfair Display" font for the heading.
       The two preconnect lines below are a speed optimization — they
       open an early connection to Google's font servers so the font
       downloads faster. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Links the external stylesheet. The browser loads styles.css
       and applies its rules to this page. -->
  <link rel="stylesheet" href="styles.css" />
</head>

<!-- The <body> holds everything you actually SEE on the page. -->
<body>
  <!-- <main> wraps the primary content. The CSS turns this into the
       centered white "card". -->
  <main>
    <!-- <h1> is the main heading — the biggest, most important title. -->
    <h1>Isaac</h1>

    <!-- <p> is a paragraph. Replace the placeholder text with your own tagline.
         <em> makes the word it wraps italic (and marks it as emphasized). -->
    <p>A short tagline <em>should</em> go here.</p>
  </main>
</body>

</html>
