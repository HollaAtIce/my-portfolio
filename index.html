<!DOCTYPE html>
<!-- The line above tells the browser this is a modern HTML5 document. -->

<!-- The <html> tag wraps the whole page. lang="en" says the content is in English. -->
<html lang="en">

<!-- The <head> holds information ABOUT the page (not shown on the page itself). -->
<head>
  <!-- Sets the character encoding so letters and symbols display correctly. -->
  <meta charset="UTF-8" />

  <!-- Makes the page scale nicely on phones and tablets. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- The text shown in the browser tab. -->
  <title>Isaac Cuchilla</title>

  <!-- A one-line summary search engines and link previews can show. -->
  <meta name="description" content="IC — Native Angeleno" />

  <!-- Google Fonts: load "Playfair Display" for headings.
       The two preconnect lines below are a speed optimization — they
       open an early connection to Google's font servers so the font
       downloads faster. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Links the external stylesheet. The browser loads styles.css
       and applies its rules to this page. -->
  <link rel="stylesheet" href="styles.css" />
</head>

<!-- The <body> holds everything you actually SEE on the page. -->
<body>
  <!-- A slim top navigation bar. The 👁️ eye is a small brand mark,
       echoing the motif from isaaccuchilla.com. -->
  <nav>
    <a class="brand" href="#top" aria-label="Home">👁️</a>
  </nav>

  <!-- <main> wraps the primary content of the page. -->
  <main id="top">
    <!-- The hero: name plus the three-part descriptor from the live site. -->
    <header class="hero">
      <!-- <h1> is the main heading — the biggest, most important title. -->
      <h1>Isaac Cuchilla</h1>

      <!-- The tagline. The dot separators are styled in CSS. -->
      <p class="tagline">
        <span>Angeleno</span>
        <span>Back for the first time</span>
        <span>No better time than now</span>
      </p>
    </header>
  </main>

  <!-- A simple footer for contact / the live site. -->
  <footer>
    <p>FYPM</p>
  </footer>
</body>

</html>
